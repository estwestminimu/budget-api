services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budgetdb
      POSTGRES_USER: budgetuser
      POSTGRES_PASSWORD: budgetpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budget-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetuser -d budgetdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/budgetdb
      SPRING_DATASOURCE_USERNAME: budgetuser
      SPRING_DATASOURCE_PASSWORD: budgetpass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget-network

networks:
  budget-network:
    driver: bridge

volumes:
  postgres_data: