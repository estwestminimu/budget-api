version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budgetdb
      POSTGRES_USER: budgetuser
      POSTGRES_PASSWORD: budgetpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/budgetdb
      SPRING_DATASOURCE_USERNAME: budgetuser
      SPRING_DATASOURCE_PASSWORD: budgetpass
    depends_on:
      - db

volumes:
  postgres_data: